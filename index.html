<!DOCTYPE html>
<html>
<head>
  <title>My Game Hub</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 150px);
      gap: 15px;
      justify-content: center;
    }

    .game {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    .game:hover {
      background: #444;
    }
  </style>
</head>
<body>

<h1>🎮 My Game Hub</h1>

<div class="grid">
  <div class="game" onclick="openGame('game1.html')">Click Game</div>
<div class="game" onclick="openGame('games/game2.html')">Snake</div>
<div class="game" onclick="openGame('games/game3.html')">Dodge</div>
  <div class="game" onclick="openGame('game1.html')">Click Game</div>
</div>

<script>
function openGame(link) {
  window.location.href = link;
}
</script>

</body>
</html>
